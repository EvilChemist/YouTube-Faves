<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Channels</title>

  <style>
    :root {
      font-size: 16px; /* 1rem baseline */
    }

    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 1.25rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 2.5rem;
      color: #333;
      font-size: 2rem; /* ~32px */
    }

    /* Grid layout */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2.8rem; /* 45px */
      max-width: 131rem; /* 2100px */
      margin: 0 auto;
    }

    /* Card styling */
    .video-card {
      background: #fff;
      border-radius: 0.9rem;
      overflow: hidden;
      box-shadow: 0 0.4rem 0.9rem rgba(0,0,0,0.15);
      padding-bottom: 1.4rem;
      text-align: center;
    }

    /* Circle images sized for 3rem text */
    .video-frame img {
      width: 4rem;      /* fits 3rem text comfortably */
      height: 4rem;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      margin: 0 auto;
    }

    .video-link {
      margin-top: 1.1rem;
    }

    .video-link a {
      color: #1a0dab;
      text-decoration: none;
      font-size: 1.25rem; /* 20px */
      font-weight: bold;
    }

    .video-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>YouTube Channels</h1>

  <div class="video-grid">
