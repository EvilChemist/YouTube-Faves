<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Train Links</title>

<style>
    body {
        background: #eef3f7;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
        padding: 40px 0;
        text-align: center;
    }

    h1 {
        font-size: 2.5rem;
        color: #333;
        margin-bottom: 40px;
    }

    /* TRAIN ANIMATION */
    @keyframes moveTrain {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(120%); }
    }

    .train-wrapper {
        width: 100%;
        overflow: hidden;
        margin-top: 40px;
    }

    .train {
        display: flex;
        gap: 30px;
        animation: moveTrain 18s linear infinite;
        align-items: flex-end;
    }

    /* TRAIN CARS */
    .car {
        background: #ffffff;
        border: 3px solid #444;
        border-radius: 10px;
        width: 180px;
        padding: 20px;
        position: relative;
        box-shadow: 0 4px 6px rgba(0,0,0,0.15);
    }

    .car a {
        text-decoration: none;
        color: #222;
        font-weight: bold;
        font-size: 1.1rem;
    }

    /* WHEELS */
    .car:before, .car:after {
        content: "";
        position: absolute;
        bottom: -22px;
        width: 35px;
        height: 35px;
        background: #333;
        border-radius: 50%;
    }

    .car:before { left: 20px; }
    .car:after { right: 20px; }

    /* ENGINE */
    .engine {
        background: #d9e8ff;
        border-color: #2a4d8f;
    }

    .engine-stack {
        width: 40px;
        height: 40px;
        background: #2a4d8f;
        border-radius: 5px;
        margin: 0 auto 10px auto;
    }

    /* TRACK */
    .track {
        width: 100%;
        height: 6px;
        background: #555;
        margin-top: 60px;
    }
</style>
</head>

<body>

<h1>All Aboard!</h1>

<div class="train-wrapper">
    <div class="train">

        <div class="car engine">
            <div class="engine-stack"></div>
            <a href="https://evilchemist.github.io/YouTube-Faves">Engine</a>
        </div>

        <div class="car"><a href="#">ABC Mouse</a></div>
        <div class="car"><a href="#">Letters</a></div>
        <div class="car"><a href="#">Storybots</a></div>
        <div class="car"><a href="#">Storybots Letters</a></div>
        <div class="car"><a href="#">Super Simple Songs</a></div>
        <div class="car"><a href="#">The Pigeon and Peppa Pig</a></div>
        <div class="car"><a href="#">YouTube Channels</a></div>

    </div>
</div>

<div class="track"></div>

</body>
</html>
