<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Train Links</title>

<style>
    body {
        background: #e8f1f8;
        font-family: Arial, sans-serif;
        overflow-x: hidden;
        padding: 40px 0;
        text-align: center;
    }

    h1 {
        font-size: 2.5rem;
        color: #333;
        margin-bottom: 40px;
    }

    /* TRAIN ANIMATION (reversed direction) */
    @keyframes moveTrain {
        0% { transform: translateX(120%); }
        100% { transform: translateX(-120%); }
    }

    .train-wrapper {
        width: 100%;
        overflow: hidden;
        margin-top: 40px;
    }

    .train {
        display: flex;
        gap: 40px;
        animation: moveTrain 20s linear infinite;
        align-items: flex-end;
    }

    /* CARTOON TRAIN CARS */
    .car {
        background: #fff;
        border: 4px solid #333;
        border-radius: 15px 15px 5px 5px; /* rounded roof */
        width: 200px;
        padding: 20px;
        position: relative;
        box-shadow: 0 4px 6px rgba(0,0,0,0.2);
    }

    .car a {
        text-decoration: none;
        color: #222;
        font-weight: bold;
        font-size: 1.1rem;
    }

    /* WHEELS (cartoon style) */
    .car:before, .car:after {
        content: "";
        position: absolute;
        bottom: -28px;
        width: 45px;
        height: 45px;
        background: #222;
        border: 4px solid #555;
        border-radius: 50%;
    }

    .car:before { left: 25px; }
    .car:after { right: 25px; }

    /* ENGINE */
    .engine {
        background: #cfe2ff;
        border-color: #1f3f7a;
    }

    .engine-stack {
        width: 50px;
        height: 60px;
        background: #1f3f7a;
        border-radius: 10px 10px 0 0;
        margin: 0 auto 10px auto;
    }

    /* TRACK */
    .track {
        width: 100%;
        height: 8px;
        background: #444;
        margin-top: 60px;
    }
</style>
</head>

<body>

<h1>All Aboard!</h1>

<div class="train-wrapper">
    <div class="train">

        <div class="car engine">
            <div class="engine-stack"></div>
            <a href="https://evilchemist.github.io/YouTube-Faves">Engine</a>
        </div>

        <div class="car"><a href="#">ABC Mouse</a></div>
        <div class="car"><a href="#">Letters</a></div>
        <div class="car"><a href="#">Storybots</a></div>
        <div class="car"><a href="#">Storybots Letters</a></div>
        <div class="car"><a href="#">Super Simple Songs</a></div>
        <div class="car"><a href="#">The Pigeon and Peppa Pig</a></div>
        <div class="car"><a href="#">YouTube Channels</a></div>

    </div>
</div>

<div class="track"></div>

</body>
</html>
