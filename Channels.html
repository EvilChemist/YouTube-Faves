      padding-bottom: 15px;
    }

    .video-frame {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
    }

    .video-frame iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .video-link {
      text-align: center;
      margin-top: 12px;
    }

    .video-link a {
      color: #1a0dab;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }

    .video-link a:hover {
      text-decoration: underline;
    }

</head>
