<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YouTube Channels</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 40px;
      color: #333;
    }

    /* 1.5× larger grid */
    .video-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 45px;
      max-width: 2100px;
      margin: 0 auto;
    }

    /* 1.5× larger cards */
    .video-card {
      background: #fff;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 6px 15px rgba(0,0,0,0.15);
      padding-bottom: 22px;
      transform: scale(1.5);
      transform-origin: top left;
    }

    .video-frame {
      width: 100%;
      overflow: hidden;
    }

    .video-frame img {
      width: 100%;
      height: auto;
      display: block;
    }

    .video-link {
      text-align: center;
      margin-top: 12px;
    }

    .video-link a {
      color: #1a0dab;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
    }

    .video-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <h1>YouTube Channels</h1>

  <div class="video-grid">

    <!-- BLMA Models -->
